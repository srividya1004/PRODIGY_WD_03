<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Tic-Tac-Toe</title>
  <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@700;900&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet"/>
  <style>
    :root{
      --bg:#0a0a0f;--surface:#13131e;--card:#1a1a2e;
      --purple:#7c3aed;--purple-light:#a855f7;
      --gold:#f59e0b;--green:#10b981;--red:#ef4444;
      --white:#f1f0ff;--muted:#6b6b8a;
    }
    *{margin:0;padding:0;box-sizing:border-box;}
    html{scroll-behavior:smooth;}
    body{background:var(--bg);color:var(--white);font-family:'Nunito',sans-serif;min-height:100vh;
      display:flex;flex-direction:column;align-items:center;justify-content:flex-start;
      padding:2rem 1rem 4rem;overflow-x:hidden;}
    body::before{content:'';position:fixed;width:600px;height:600px;
      background:radial-gradient(circle,rgba(124,58,237,0.15) 0%,transparent 70%);
      top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:0;}

    /* TITLE */
    .game-title{font-family:'Cinzel',serif;font-size:clamp(2rem,5vw,3rem);font-weight:900;text-align:center;
      margin-bottom:0.3rem;position:relative;z-index:1;letter-spacing:3px;}
    .game-title span{color:var(--gold);}
    .game-subtitle{color:var(--muted);font-size:0.8rem;text-align:center;margin-bottom:1.5rem;
      letter-spacing:4px;text-transform:uppercase;position:relative;z-index:1;}

    /* MODE SELECTOR */
    .mode-selector{display:flex;gap:1rem;margin-bottom:1.5rem;position:relative;z-index:1;}
    .mode-btn{padding:0.6rem 1.6rem;border-radius:30px;border:1px solid var(--purple);background:transparent;
      color:var(--white);font-family:'Nunito',sans-serif;font-size:0.9rem;font-weight:700;cursor:pointer;transition:all 0.3s;}
    .mode-btn.active,.mode-btn:hover{background:var(--purple);color:var(--white);}

    /* SCREENS */
    .screen{position:fixed;inset:0;z-index:300;display:flex;flex-direction:column;align-items:center;
      justify-content:center;gap:1.4rem;padding:2rem;background:rgba(10,10,15,0.98);}
    .screen.hidden{display:none;}
    .screen h2{font-family:'Cinzel',serif;font-size:2rem;font-weight:900;text-align:center;letter-spacing:2px;}
    .screen h2 span{color:var(--gold);}
    .screen p{color:var(--muted);font-size:0.9rem;text-align:center;}
    .name-inputs{display:flex;flex-direction:column;gap:1rem;width:100%;max-width:340px;}
    .name-input-group{display:flex;flex-direction:column;gap:0.4rem;}
    .name-input-group label{font-size:0.75rem;letter-spacing:3px;text-transform:uppercase;color:var(--purple-light);font-weight:800;}
    .name-input-group input{background:var(--card);border:1px solid rgba(124,58,237,0.3);border-radius:12px;
      padding:0.75rem 1rem;color:var(--white);font-family:'Nunito',sans-serif;font-size:1rem;font-weight:600;
      outline:none;transition:border-color 0.3s;width:100%;}
    .name-input-group input:focus{border-color:var(--gold);}
    .name-input-group input::placeholder{color:var(--muted);}
    .name-input-group input:disabled{opacity:0.4;cursor:not-allowed;}
    .big-btn{background:var(--purple);color:var(--white);border:none;border-radius:30px;padding:0.85rem 2.5rem;
      font-family:'Cinzel',sans-serif;font-size:1rem;font-weight:700;letter-spacing:2px;cursor:pointer;
      transition:all 0.3s;width:100%;max-width:340px;}
    .big-btn:hover{background:var(--purple-light);transform:translateY(-2px);}

    /* INTRO SCREEN */
    #introScreen{background:rgba(10,10,15,0.98);}
    .intro-heading{font-family:'Cinzel',serif;font-size:clamp(1.3rem,4vw,1.9rem);font-weight:900;color:var(--gold);
      text-align:center;letter-spacing:2px;animation:fadeDown 0.7s ease both;}
    .intro-vs{color:var(--muted);font-size:0.75rem;letter-spacing:5px;text-transform:uppercase;text-align:center;
      animation:fadeDown 0.7s ease 0.1s both;opacity:0;}
    .scene-box{position:relative;width:min(560px,96vw);animation:fadeUp 0.7s ease 0.2s both;opacity:0;}
    .name-tags{display:flex;justify-content:space-between;padding:0 40px;margin-bottom:8px;}
    .ntag{display:flex;flex-direction:column;align-items:center;gap:3px;}
    .ntag .nname{font-family:'Cinzel',serif;font-size:0.95rem;font-weight:700;color:var(--white);letter-spacing:1px;}
    .ntag .nsym{font-size:1.2rem;font-weight:700;}
    .ntag.left .nsym{color:var(--gold);}.ntag.right .nsym{color:var(--purple-light);}
    .sbubble{position:absolute;background:var(--card);border:1px solid rgba(124,58,237,0.5);border-radius:10px;
      padding:5px 11px;font-size:0.75rem;font-family:'Nunito',sans-serif;font-weight:700;color:var(--purple-light);
      white-space:nowrap;top:-8px;opacity:0;animation:popBubble 0.4s ease forwards;}
    .sbubble.bl{left:28px;}.sbubble.bl::after{content:'';position:absolute;bottom:-6px;left:14px;border:6px solid transparent;border-top-color:var(--card);}
    .sbubble.br{right:28px;}.sbubble.br::after{content:'';position:absolute;bottom:-6px;right:14px;border:6px solid transparent;border-top-color:var(--card);}
    @keyframes popBubble{from{opacity:0;transform:scale(0.7) translateY(6px);}to{opacity:1;transform:scale(1) translateY(0);}}
    .scene-svg{width:100%;display:block;}
    .pen-arm{transform-origin:110px 148px;animation:writeMove 1.2s ease-in-out 1.2s infinite alternate;}
    @keyframes writeMove{from{transform:rotate(-8deg);}to{transform:rotate(8deg);}}
    .think-head{animation:headBob 2s ease-in-out 0.8s infinite alternate;}
    @keyframes headBob{from{transform:translateY(0);}to{transform:translateY(-4px);}}
    .dot1{animation:dotAppear 0.3s ease 1.5s both;}
    .dot2{animation:dotAppear 0.3s ease 1.8s both;}
    .dot3{animation:dotAppear 0.3s ease 2.1s both;}
    @keyframes dotAppear{from{opacity:0;}to{opacity:1;}}
    .letsplay-btn{background:var(--gold);color:#0a0a0f;border:none;border-radius:30px;padding:0.9rem 3rem;
      font-family:'Cinzel',sans-serif;font-size:1rem;font-weight:700;cursor:pointer;letter-spacing:2px;
      opacity:0;animation:fadeUp 0.6s ease 2.6s both;transition:all 0.3s;}
    .letsplay-btn:hover{background:var(--purple-light);color:var(--white);transform:scale(1.05);}

    /* PLAYER SCORE CARDS (top) */
    .players-area{display:flex;align-items:center;justify-content:center;gap:1.5rem;margin-bottom:1rem;
      width:100%;max-width:520px;position:relative;z-index:1;}
    .player-card{
      background:var(--card);border:2px solid rgba(124,58,237,0.25);border-radius:18px;
      padding:0.7rem 1rem;text-align:center;flex:1;transition:all 0.3s ease;position:relative;overflow:hidden;
    }
    /* icon bar accent top of card */
    .player-card::before{content:'';position:absolute;top:0;left:0;right:0;height:3px;
      background:rgba(124,58,237,0.3);border-radius:18px 18px 0 0;transition:background 0.3s;}
    .player-card.active-turn{border-color:var(--gold);box-shadow:0 0 22px rgba(245,158,11,0.28);transform:scale(1.04);}
    .player-card.active-turn::before{background:var(--gold);}
    .player-card.winner-card{border-color:var(--green);box-shadow:0 0 28px rgba(16,185,129,0.38);}
    .player-card.winner-card::before{background:var(--green);}
    .card-icon-row{display:flex;align-items:center;justify-content:center;gap:6px;margin-bottom:4px;}
    .card-badge{font-size:1.1rem;}
    .pfig{width:46px;height:46px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 0.3rem;}
    .pfig.human{border:2px solid rgba(245,158,11,0.5);background:linear-gradient(135deg,#1e1030,#2d1060);}
    .pfig.ai{border:2px solid rgba(168,85,247,0.5);background:linear-gradient(135deg,#1a0535,#3b0764);}
    .pfig svg{width:30px;height:30px;}
    .player-name{font-family:'Cinzel',serif;font-weight:700;font-size:0.8rem;margin-bottom:0.1rem;letter-spacing:1px;}
    .player-symbol{font-size:1.1rem;font-weight:800;}
    .player-symbol.x-sym{color:var(--gold);}.player-symbol.o-sym{color:var(--purple-light);}
    .player-score{font-family:'Cinzel',serif;font-size:1.5rem;font-weight:700;color:var(--white);margin-top:0.15rem;}
    .score-label{font-size:0.6rem;color:var(--muted);text-transform:uppercase;letter-spacing:2px;font-weight:800;}
    .vs-badge{font-family:'Cinzel',serif;font-size:1.1rem;font-weight:700;color:var(--muted);flex-shrink:0;letter-spacing:2px;}

    /* APPRECIATION */
    .appreciation{min-height:34px;text-align:center;font-size:0.9rem;font-weight:700;color:var(--gold);
      margin-bottom:0.8rem;padding:0.4rem 1rem;border-radius:30px;
      background:rgba(245,158,11,0.08);border:1px solid rgba(245,158,11,0.15);
      max-width:420px;width:100%;position:relative;z-index:1;font-family:'Nunito',sans-serif;}

    /* GAME ARENA — anime figures + board side by side */
    .game-arena{
      display:flex;align-items:center;justify-content:center;
      gap:0;position:relative;z-index:1;margin-bottom:1.5rem;
    }

    /* ANIME CHARACTER PANEL */
    .char-panel{
      display:flex;flex-direction:column;align-items:center;gap:4px;
      width:90px;flex-shrink:0;
    }
    .char-name-tag{
      font-family:'Cinzel',serif;font-size:0.65rem;font-weight:700;letter-spacing:1px;
      padding:2px 8px;border-radius:20px;text-align:center;
    }
    .char-name-tag.gold{color:var(--gold);background:rgba(245,158,11,0.12);border:1px solid rgba(245,158,11,0.3);}
    .char-name-tag.purple{color:var(--purple-light);background:rgba(168,85,247,0.12);border:1px solid rgba(168,85,247,0.3);}
    .char-svg-wrap{position:relative;width:80px;height:140px;}
    .char-svg-wrap svg{width:80px;height:140px;}

    /* speech bubble on chars */
    .char-bubble{
      position:absolute;background:var(--card);border:1px solid rgba(124,58,237,0.5);
      border-radius:8px;padding:3px 7px;font-size:0.65rem;font-family:'Nunito',sans-serif;font-weight:700;
      color:var(--purple-light);white-space:nowrap;pointer-events:none;
      opacity:0;transition:opacity 0.25s;z-index:5;top:-24px;
    }
    .char-bubble.show{opacity:1;}
    .char-bubble.right-side{right:-4px;}
    .char-bubble.right-side::after{content:'';position:absolute;bottom:-5px;right:10px;border:5px solid transparent;border-top-color:var(--card);}
    .char-bubble.left-side{left:-4px;}
    .char-bubble.left-side::after{content:'';position:absolute;bottom:-5px;left:10px;border:5px solid transparent;border-top-color:var(--card);}

    /* arm reach animation */
    @keyframes armReachRight{0%{transform:rotate(0);}40%{transform:rotate(30deg) translateX(6px);}100%{transform:rotate(0);}}
    @keyframes armReachLeft{0%{transform:rotate(0);}40%{transform:rotate(-30deg) translateX(-6px);}100%{transform:rotate(0);}}
    @keyframes charJump{0%,100%{transform:translateY(0);}30%{transform:translateY(-10px);}60%{transform:translateY(-5px);}}
    @keyframes charSad{0%,100%{transform:rotate(0);}50%{transform:rotate(-4deg) translateY(3px);}}
    @keyframes sparkle{0%{opacity:0;transform:scale(0);}50%{opacity:1;transform:scale(1.2);}100%{opacity:0;transform:scale(0);}}

    .arm-right-reach{animation:armReachRight 0.55s ease-in-out;}
    .arm-left-reach{animation:armReachLeft 0.55s ease-in-out;}
    .char-jump{animation:charJump 0.6s ease-in-out 3;}
    .char-sad{animation:charSad 0.5s ease-in-out 2;}

    /* sparkle stars for win */
    .sparkle{position:absolute;font-size:14px;pointer-events:none;animation:sparkle 0.7s ease forwards;}

    /* BOARD */
    .board-wrapper{position:relative;z-index:1;}
    .board{display:grid;grid-template-columns:repeat(3,1fr);gap:9px;background:var(--surface);padding:12px;
      border-radius:20px;border:1px solid rgba(124,58,237,0.2);box-shadow:0 8px 40px rgba(0,0,0,0.5);}
    .cell{width:95px;height:95px;background:var(--card);border-radius:12px;border:2px solid rgba(124,58,237,0.15);
      display:flex;align-items:center;justify-content:center;font-size:2.6rem;font-weight:700;
      cursor:pointer;transition:all 0.2s ease;user-select:none;}
    .cell:hover:not(.taken){background:rgba(124,58,237,0.15);border-color:var(--purple);transform:scale(1.05);}
    .cell.taken{cursor:default;}
    .cell.x{color:var(--gold);}.cell.o{color:var(--purple-light);}
    .cell.winning{background:rgba(16,185,129,0.15);border-color:var(--green);
      box-shadow:0 0 20px rgba(16,185,129,0.3);animation:pulse-win 0.6s ease infinite alternate;}
    @keyframes pulse-win{from{transform:scale(1);}to{transform:scale(1.07);}}
    .cell .mark{animation:popIn 0.2s cubic-bezier(0.34,1.56,0.64,1) both;}
    @keyframes popIn{from{transform:scale(0) rotate(-20deg);opacity:0;}to{transform:scale(1) rotate(0deg);opacity:1;}}

    /* BUTTONS */
    .action-btns{display:flex;gap:1rem;position:relative;z-index:1;}
    .btn{padding:0.65rem 1.6rem;border-radius:30px;border:none;font-family:'Nunito',sans-serif;
      font-size:0.9rem;font-weight:800;cursor:pointer;transition:all 0.3s ease;}
    .btn-purple{background:var(--purple);color:var(--white);}
    .btn-purple:hover{background:var(--purple-light);transform:translateY(-2px);}
    .btn-outline{background:transparent;color:var(--white);border:1px solid var(--muted);}
    .btn-outline:hover{border-color:var(--gold);color:var(--gold);transform:translateY(-2px);}

    /* WINNER OVERLAY */
    #winnerOverlay{position:fixed;inset:0;z-index:400;display:none;flex-direction:column;
      align-items:center;justify-content:center;gap:1.2rem;
      background:rgba(10,10,15,0.95);backdrop-filter:blur(6px);}
    #winnerOverlay.show{display:flex;}

    .winner-card-box{
      background:var(--card);border-radius:24px;padding:2rem 2.5rem;text-align:center;
      border:2px solid var(--green);
      box-shadow:0 0 60px rgba(16,185,129,0.3),0 0 120px rgba(16,185,129,0.1);
      animation:zoomIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      max-width:340px;width:90%;position:relative;overflow:hidden;
    }
    /* shimmer bar on winner card */
    .winner-card-box::after{
      content:'';position:absolute;top:0;left:-100%;width:60%;height:100%;
      background:linear-gradient(90deg,transparent,rgba(255,255,255,0.04),transparent);
      animation:shimmer 2s linear 0.6s infinite;
    }
    @keyframes shimmer{to{left:160%;}}
    .draw-card-box{
      background:var(--card);border-radius:24px;padding:2rem 2.5rem;text-align:center;
      border:2px solid var(--purple);
      box-shadow:0 0 60px rgba(124,58,237,0.3);
      animation:zoomIn 0.5s cubic-bezier(0.34,1.56,0.64,1) both;
      max-width:340px;width:90%;
    }
    @keyframes zoomIn{from{transform:scale(0.5);opacity:0;}to{transform:scale(1);opacity:1;}}

    /* winner card icons row */
    .wcard-icons{font-size:1.6rem;margin-bottom:0.4rem;letter-spacing:4px;
      animation:trophyBounce 0.6s ease 0.4s both;}
    @keyframes trophyBounce{0%{transform:scale(0) rotate(-20deg);}70%{transform:scale(1.3) rotate(5deg);}100%{transform:scale(1) rotate(0deg);}}

    /* anime figure in winner card */
    .winner-anime-fig{
      width:80px;height:80px;margin:0 auto 0.8rem;position:relative;
      animation:figureGlow 1.5s ease infinite alternate;
    }
    .winner-anime-fig svg{width:80px;height:80px;}
    @keyframes figureGlow{from{filter:drop-shadow(0 0 6px rgba(16,185,129,0.4));}to{filter:drop-shadow(0 0 18px rgba(16,185,129,0.8));}}
    .winner-label{font-family:'Nunito',sans-serif;font-size:0.7rem;letter-spacing:4px;text-transform:uppercase;
      color:var(--green);font-weight:800;margin-bottom:0.2rem;}
    .winner-name{font-family:'Cinzel',serif;font-size:1.8rem;font-weight:900;color:var(--white);
      margin-bottom:0.2rem;letter-spacing:2px;}
    .winner-sym{font-size:1.4rem;margin-bottom:0.3rem;}
    .winner-msg{font-family:'Nunito',sans-serif;font-size:0.9rem;color:var(--muted);margin-bottom:1.2rem;font-weight:600;}
    .winner-btns{display:flex;gap:0.8rem;justify-content:center;flex-wrap:wrap;}
    .winner-btns .btn{font-family:'Nunito',sans-serif;font-size:0.85rem;}

    /* CONFETTI */
    .confetti-piece{position:fixed;width:10px;height:10px;top:-10px;border-radius:2px;
      animation:confettiFall linear forwards;z-index:999;pointer-events:none;}
    @keyframes confettiFall{to{transform:translateY(110vh) rotate(720deg);opacity:0;}}

    /* THINKING DOTS */
    .thinking{display:inline-flex;gap:4px;align-items:center;}
    .thinking span{width:6px;height:6px;background:var(--purple-light);border-radius:50%;animation:blink 1s infinite;}
    .thinking span:nth-child(2){animation-delay:0.2s;}.thinking span:nth-child(3){animation-delay:0.4s;}
    @keyframes blink{0%,100%{opacity:0.2;transform:scale(0.8);}50%{opacity:1;transform:scale(1.2);}}

    /* KEYFRAMES */
    @keyframes fadeUp{from{opacity:0;transform:translateY(24px);}to{opacity:1;transform:translateY(0);}}
    @keyframes fadeDown{from{opacity:0;transform:translateY(-16px);}to{opacity:1;transform:translateY(0);}}

    @media(max-width:520px){
      .cell{width:78px;height:78px;font-size:2.1rem;}
      .char-panel{width:68px;}.char-svg-wrap{width:64px;height:120px;}.char-svg-wrap svg{width:64px;height:120px;}
      .players-area{gap:0.8rem;}.player-card{padding:0.6rem 0.7rem;}
    }
  </style>
</head>
<body>

<!-- ════════ SCREEN 1: NAME ENTRY ════════ -->
<div class="screen" id="nameScreen">
  <h2>Welcome to<br/><span>Tic‑Tac‑Toe</span></h2>
  <p>Enter player names to begin</p>
  <div class="mode-selector" style="margin-bottom:0">
    <button class="mode-btn active" id="btnE1" onclick="selectMode('pvp')">👥 Player vs Player</button>
    <button class="mode-btn"        id="btnE2" onclick="selectMode('pva')">🤖 Player vs AI</button>
  </div>
  <div class="name-inputs">
    <div class="name-input-group">
      <label>✕ Player 1 Name</label>
      <input type="text" id="inp1" placeholder="Enter your name…" maxlength="14"/>
    </div>
    <div class="name-input-group" id="p2group">
      <label>〇 Player 2 Name</label>
      <input type="text" id="inp2" placeholder="Enter player 2 name…" maxlength="14"/>
    </div>
  </div>
  <button class="big-btn" onclick="showIntro()">🚀 Start Game</button>
</div>

<!-- ════════ SCREEN 2: INTRO SCENE ════════ -->
<div class="screen hidden" id="introScreen">
  <div class="intro-heading" id="introHeading">⚔️ Get Ready!</div>
  <div class="intro-vs">THE BATTLE BEGINS</div>
  <div class="scene-box">
    <div class="sbubble bl" id="bub1" style="animation-delay:1.0s">✏️ Planning my moves…</div>
    <div class="sbubble br" id="bub2" style="animation-delay:1.3s">🤔 I've got a strategy!</div>
    <div class="name-tags">
      <div class="ntag left"><span class="nname" id="sname1">Player 1</span><span class="nsym">✕</span></div>
      <div class="ntag right"><span class="nname" id="sname2">Player 2</span><span class="nsym">〇</span></div>
    </div>
    <svg class="scene-svg" viewBox="0 0 560 290" xmlns="http://www.w3.org/2000/svg">
      <defs><radialGradient id="glow" cx="50%" cy="50%" r="50%"><stop offset="0%" stop-color="rgba(124,58,237,0.12)"/><stop offset="100%" stop-color="rgba(124,58,237,0)"/></radialGradient></defs>
      <ellipse cx="280" cy="220" rx="250" ry="60" fill="url(#glow)"/>
      <rect x="110" y="185" width="340" height="16" rx="8" fill="#1a1a2e" stroke="rgba(124,58,237,0.5)" stroke-width="1.5"/>
      <rect x="135" y="200" width="10" height="50" rx="5" fill="#13131e"/>
      <rect x="415" y="200" width="10" height="50" rx="5" fill="#13131e"/>
      <rect x="115" y="186" width="330" height="4" rx="2" fill="rgba(255,255,255,0.04)"/>
      <rect x="212" y="152" width="136" height="36" rx="7" fill="#13131e" stroke="rgba(124,58,237,0.6)" stroke-width="1.5"/>
      <line x1="257" y1="154" x2="257" y2="186" stroke="rgba(124,58,237,0.5)" stroke-width="1.2"/>
      <line x1="302" y1="154" x2="302" y2="186" stroke="rgba(124,58,237,0.5)" stroke-width="1.2"/>
      <line x1="214" y1="166" x2="346" y2="166" stroke="rgba(124,58,237,0.5)" stroke-width="1.2"/>
      <line x1="214" y1="176" x2="346" y2="176" stroke="rgba(124,58,237,0.5)" stroke-width="1.2"/>
      <text x="222" y="163" fill="#f59e0b" font-size="10" font-weight="bold" font-family="sans-serif">✕</text>
      <text x="264" y="174" fill="#a855f7" font-size="10" font-weight="bold" font-family="sans-serif">〇</text>

  let bub1T=null,bub2T=null;
  function showCharBubble(who,text,ms=1600){
    const id=who==='X'?'cbub1':'cbub2';
    const el=document.getElementById(id);
    el.textContent=text;el.classList.add('show');
    clearTimeout(who==='X'?bub1T:bub2T);
    const t=setTimeout(()=>el.classList.remove('show'),ms);
    if(who==='X')bub1T=t;else bub2T=t;
  }

  // ── ARM REACTION ──
  function triggerArmReach(player){
    if(player==='X'){
      const arm=document.getElementById('p1rightArm');
      arm.style.transformOrigin='58px 78px';
      arm.classList.remove('arm-right-reach');void arm.offsetWidth;
      arm.classList.add('arm-right-reach');
    } else {
      const arm=document.getElementById('p2leftArm');
      arm.style.transformOrigin='22px 78px';
      arm.classList.remove('arm-left-reach');void arm.offsetWidth;
      arm.classList.add('arm-left-reach');
    }
  }

  // ── CHAR WIN/LOSE REACTION ──
  function triggerWinReaction(winner){
    const ww=document.getElementById(winner==='X'?'charWrap1':'charWrap2');
    const lw=document.getElementById(winner==='X'?'charWrap2':'charWrap1');
    ww.classList.remove('char-jump');void ww.offsetWidth;ww.classList.add('char-jump');
    lw.classList.remove('char-sad');void lw.offsetWidth;lw.classList.add('char-sad');
    // change winner mouth to big smile
    const mId=winner==='X'?'p1anmeMouth':'p2animeMouth';
    const m=document.getElementById(mId);
    if(m)m.setAttribute('d',winner==='X'?'M30 52 Q40 62 50 52':'M30 52 Q40 62 50 52');
    // change loser mouth to frown
    const lmId=winner==='X'?'p2animeMouth':'p1anmeMouth';
    const lm=document.getElementById(lmId);
    if(lm)lm.setAttribute('d','M33 54 Q40 50 47 54');
    // sparkles around winner
    spawnSparkles(winner==='X'?'charWrap1':'charWrap2');
  }

  function triggerDrawReaction(){
    document.getElementById('charWrap1').classList.remove('char-jump');
    document.getElementById('charWrap2').classList.remove('char-jump');
  }

  function spawnSparkles(wrapId){
    const wrap=document.getElementById(wrapId);
    ['⭐','✨','🌟','💫'].forEach((s,i)=>{
      const el=document.createElement('div');
      el.className='sparkle';el.textContent=s;
      el.style.left=(10+Math.random()*60)+'px';
      el.style.top=(10+Math.random()*80)+'px';
      el.style.animationDelay=(i*0.15)+'s';
      wrap.appendChild(el);
      setTimeout(()=>el.remove(),1200);
    });
  }

  // ── HIGHLIGHT ACTIVE ──
  function highlightMini(next){
    document.getElementById('card1').classList.toggle('active-turn',next==='X');
    document.getElementById('card2').classList.toggle('active-turn',next==='O');
    // glow char panel
    document.getElementById('charPanel1').style.opacity=next==='X'?'1':'0.55';
    document.getElementById('charPanel2').style.opacity=next==='O'?'1':'0.55';
  }

  // ── HANDLE CLICK ──
  function handleClick(i){
    if(board[i]!==''||gameOver)return;
    if(mode==='pva'&&currentPlayer==='O')return;
    triggerArmReach('X');
    showCharBubble('X',rnd(['✏️ My move!','⚡ Got it!','💡 Ha!','✕ There!']));
    makeMove(i,currentPlayer);
    if(!gameOver)setMsg(rnd(['✨ Brilliant move!','🔥 On fire!','💡 Smart play!','👏 Nice one!','⚡ Sharp!']));
    if(mode==='pva'&&!gameOver){
      setMsg('🤖 AIVA is thinking…',true);
      setTimeout(()=>{
        triggerArmReach('O');
        showCharBubble('O',rnd(['🤖 Calculated!','💡 My turn!','⚡ Watch!','〇 Done!']));
        makeMove(getBestMove(),'O');
        if(!gameOver)setMsg(rnd(['😮 AIVA strikes!','🤖 AIVA moved!','👾 AIVA is serious!']));
      },700);
    }
  }

  // ── MAKE MOVE ──
  function makeMove(i,pl){
    board[i]=pl;
    const c=document.querySelector(`[data-i="${i}"]`);
    c.classList.add('taken',pl.toLowerCase());
    c.innerHTML=`<span class="mark">${pl==='X'?'✕':'〇'}</span>`;
    const next=pl==='X'?'O':'X';
    highlightMini(next);
    const w=checkWin();
    if(w){
      gameOver=true;
      w.forEach(i=>document.querySelector(`[data-i="${i}"]`).classList.add('winning'));
      scores[pl]++;updateScores();
      triggerWinReaction(pl);
      setTimeout(()=>showWinnerCard(pl),900);
      return;
    }
    if(board.every(c=>c!=='')){
      gameOver=true;
      triggerDrawReaction();
      setTimeout(()=>showDrawCard(),700);
      return;
    }
    currentPlayer=next;
    if(next==='X')setMsg(rnd(['Your turn, '+p1+'! 🎯','Think, '+p1+'! 💭','Move, '+p1+'! ⚡']));
    else if(mode==='pvp'){
      setMsg(rnd(['Your turn, '+p2+'! 🎯',p2+"'s move! 💡",'Go '+p2+'! 🔥']));
      showCharBubble('O',rnd(['🤔 Let me think…','💭 Hmm…','😤 My move!']));
    }
  }

  // ── WINNER CARD ──
  function showWinnerCard(pl){
    const isX=pl==='X';
    const name=isX?p1:(mode==='pva'?'AIVA':p2);
    const isAI=!isX&&mode==='pva';
    const box=document.getElementById('winnerCardBox');
    box.className='winner-card-box';
    // icon row
    document.getElementById('wcardIcons').textContent=isAI?'🤖⚡🏆':isX?'🏆✨🎉':'🏅✨🎊';
    // anime figure
    const figSvg=document.getElementById('winnerFigSvg');
    figSvg.innerHTML=isAI?robotAnimeSVG():isX?goldAnimeSVG():purpleAnimeSVG();
    // fix winner fig glow color
    document.getElementById('winnerAnimeFig').style.setProperty('--glow',isAI?'rgba(124,58,237,0.8)':isX?'rgba(245,158,11,0.8)':'rgba(168,85,247,0.8)');
    document.getElementById('winnerLabel').textContent='🎉 WINNER';
    document.getElementById('winnerName').textContent=name;
    document.getElementById('winnerSym').textContent=isX?'✕':'〇';
    document.getElementById('winnerSym').style.color=isX?'var(--gold)':'var(--purple-light)';
    const msgs=isAI?['AIVA is too powerful! 🤖','The machine wins! ⚡','AI dominates! 🧠']:['Incredible victory! 🌟','Champion of the board! 🥇','Unstoppable! 💫','Absolutely brilliant! ✨'];
    document.getElementById('winnerMsg').textContent=rnd(msgs);
    document.getElementById('winnerOverlay').classList.add('show');
    if(!isAI)launchConfetti();
  }

  function showDrawCard(){
    const box=document.getElementById('winnerCardBox');
    box.className='draw-card-box';
    document.getElementById('wcardIcons').textContent='🤝⚖️😅';
    document.getElementById('winnerFigSvg').innerHTML=`
      <circle cx="15" cy="10" r="9" fill="#1a1a2e" stroke="rgba(107,107,138,0.6)" stroke-width="1.2"/>
      <ellipse cx="11" cy="10" rx="3" ry="3.5" fill="white"/><ellipse cx="19" cy="10" rx="3" ry="3.5" fill="white"/>
      <circle cx="11" cy="11" r="2" fill="#1a0a10"/><circle cx="19" cy="11" r="2" fill="#1a0a10"/>
      <path d="M12 16 L18 16" stroke="#6b6b8a" stroke-width="1.2" fill="none" stroke-linecap="round"/>
      <rect x="9" y="20" width="12" height="13" rx="4" fill="#13131e" stroke="rgba(107,107,138,0.5)" stroke-width="1"/>
      <rect x="11" y="31" width="4" height="8" rx="2" fill="#0a0a0f"/><rect x="16" y="31" width="4" height="8" rx="2" fill="#0a0a0f"/>`;
    document.getElementById('winnerLabel').textContent='⚖️ DRAW';
    document.getElementById('winnerName').textContent=p1+' & '+(mode==='pva'?'AIVA':p2);
    document.getElementById('winnerSym').textContent='✕〇';
    document.getElementById('winnerSym').style.color='var(--muted)';
    document.getElementById('winnerMsg').textContent=rnd(['Perfect balance — nobody wins!','Great battle! Too evenly matched!','Both players played brilliantly! 👏']);
    document.getElementById('winnerOverlay').classList.add('show');
  }

  function closeWinnerAndReset(){
    document.getElementById('winnerOverlay').classList.remove('show');
    // reset mouth expressions
    const m1=document.getElementById('p1anmeMouth'),m2=document.getElementById('p2animeMouth');
    if(m1)m1.setAttribute('d','M33 50 Q40 56 47 50');
    if(m2)m2.setAttribute('d','M33 50 Q40 56 47 50');
    document.getElementById('charWrap1').classList.remove('char-jump','char-sad');
    document.getElementById('charWrap2').classList.remove('char-jump','char-sad');
    resetGame();
  }

  // ── GAME UTILS ──
  function checkWin(){for(const[a,b,c]of WINS)if(board[a]&&board[a]===board[b]&&board[a]===board[c])return[a,b,c];return null;}
  function getBestMove(){
    let bs=-Infinity,bm=-1;
    for(let i=0;i<9;i++){if(board[i]===''){board[i]='O';let s=mm(board,0,false);board[i]='';if(s>bs){bs=s;bm=i;}}}
    return bm;
  }
  function mm(b,d,mx){
    const r=cwf(b);
    if(r==='O')return 10-d;if(r==='X')return d-10;if(b.every(c=>c!==''))return 0;
    if(mx){let v=-Infinity;for(let i=0;i<9;i++){if(b[i]===''){b[i]='O';v=Math.max(v,mm(b,d+1,false));b[i]='';}}return v;}
    else{let v=Infinity;for(let i=0;i<9;i++){if(b[i]===''){b[i]='X';v=Math.min(v,mm(b,d+1,true));b[i]='';}}return v;}
  }
  function cwf(b){for(const[a,x,c]of WINS)if(b[a]&&b[a]===b[x]&&b[a]===b[c])return b[a];return null;}

  function launchConfetti(){
    const cols=['#f59e0b','#7c3aed','#a855f7','#10b981','#f1f0ff','#ef4444'];
    for(let i=0;i<60;i++){
      const p=document.createElement('div');p.className='confetti-piece';
      p.style.left=Math.random()*100+'vw';p.style.background=cols[Math.floor(Math.random()*cols.length)];
      p.style.width=(Math.random()*10+6)+'px';p.style.height=(Math.random()*10+6)+'px';
      p.style.animationDuration=(Math.random()*2+1.5)+'s';p.style.animationDelay=(Math.random()*0.8)+'s';
      p.style.borderRadius=Math.random()>.5?'50%':'2px';
      document.body.appendChild(p);setTimeout(()=>p.remove(),4000);
    }
  }

  function updateScores(){document.getElementById('score1').textContent=scores.X;document.getElementById('score2').textContent=scores.O;}

  function resetGame(){
    board=Array(9).fill('');currentPlayer='X';gameOver=false;
    document.querySelectorAll('.cell').forEach(c=>{c.className='cell';c.innerHTML='';});
    highlightMini('X');
    setMsg(rnd(['🎮 '+p1+' goes first!','✨ Your move, '+p1+'!','🚀 Let\'s go '+p1+'!']));
    showCharBubble('X',rnd(['😊 Let\'s go!','🎮 Ready!','⚔️ My turn!']),1400);
  }
  function resetScore(){scores={X:0,O:0};updateScores();resetGame();}
</script>
</body>
</html>
